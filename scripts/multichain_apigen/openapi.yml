openapi: 3.0.3
info:
  title: Tonkeeper Multichain Backend
  version: 0.1.0

servers: [ ]

tags:
  - name: system
    description: "System endpoints"
  - name: nodes
    description: "Chain node manifest"
  - name: assets
    description: "Asset catalog search"
  - name: broadcast
    description: "Transaction broadcasting"
  - name: fees
    description: "Fee estimation"
  - name: wallets
    description: "Wallet registry (register, balances, activities)"

components:
  parameters:
    LimitQuery:
      name: limit
      in: query
      description: "Pagination limit"
      schema:
        type: integer
        default: 25
        example: 50
        minimum: 0
        maximum: 50
    CursorQuery:
      name: cursor
      in: query
      description: "Cursor for pagination"
      schema:
        type: string
    AssetIdsQuery:
      name: asset_ids
      in: query
      required: false
      description: "Filter by asset IDs"
      explode: false
      schema:
        type: array
        maxItems: 20
        items:
          type: string
        example: [ "ton/mainnet/coin", "eth/mainnet/erc20/0xdAC17F958D2ee523a2206206994597C13D831ec7" ]
    SortQuery:
      name: sort
      in: query
      required: true
      description: "Sort tokens by"
      schema:
        type: string
        enum: [ market_cap, volume ]
    CurrenciesQuery:
      name: currencies
      in: query
      required: true
      description: "Base currencies"
      explode: false
      schema:
        type: array
        maxItems: 50
        items:
          type: string
        example: [ "ton","usd","rub" ]
    SearchQuery:
      name: search
      in: query
      required: false
      description: "Name or symbol of token"
      schema:
        type: string
    AvailableOnlyQuery:
      name: available_only
      in: query
      required: false
      description: "Shows assets with 0 balances or not"
      schema:
        type: boolean
        default: true
    ShowAllQuery:
      name: show_all
      in: query
      required: false
      description: "Shows all possible assets"
      schema:
        type: boolean
        default: false
    ShowHiddenQuery:
      name: show_hidden
      in: query
      required: false
      description: "Flag to show hidden tokens"
      schema:
        type: boolean
        default: false
    ChainPath:
      name: chain
      in: path
      required: true
      description: "Blockchain identifier"
      schema:
        $ref: '#/components/schemas/Chain'
    AddressPath:
      name: address
      in: path
      required: true
      description: "Wallet address on the chain"
      schema:
        type: string
    WalletIdPath:
      name: wallet_id
      in: path
      required: true
      description: "Wallet identifier (client-generated)"
      schema:
        type: string
        minLength: 1
        maxLength: 128
        pattern: "^[a-zA-Z0-9_-]+$"
    ChainQuery:
      name: chain
      in: query
      required: false
      description: "Filter by chain"
      schema:
        $ref: '#/components/schemas/Chain'
    ActivityTypeQuery:
      name: activity_type
      in: query
      required: false
      description: "Filter by activity type"
      schema:
        $ref: '#/components/schemas/ActivityType'
    IfNoneMatch:
      name: If-None-Match
      in: header
      required: false
      description: "ETag value from previous response"
      schema:
        type: string

  schemas:
    Ok:
      type: object
      required:
        - ok
      properties:
        ok:
          type: boolean
    Chain:
      type: string
      enum: [ ton, eth, base, btc, tron, sol, arb, bsc ]
    Network:
      type: string
      enum: [ mainnet, testnet ]
      default: mainnet
    ChainNode:
      type: object
      required: [ chain, network, name ]
      properties:
        chain:
          $ref: '#/components/schemas/Chain'
        network:
          $ref: '#/components/schemas/Network'
        name:
          type: string
          description: "Human-readable chain name"
    SummaryAsset:
      type: object
      description: "Balance envelope — token metadata + price + amount"
      required: [ asset, price, market_cap ]
      properties:
        asset:
          $ref: "#/components/schemas/AssetInfo"
        price:
          $ref: "#/components/schemas/AssetPrice"
        market_cap:
          $ref: "#/components/schemas/AssetMarketCap"
    Asset:
      type: object
      description: "Balance envelope — token metadata + price + amount"
      required: [ asset, price, is_hidden, balance ]
      properties:
        asset:
          $ref: "#/components/schemas/AssetInfo"
        price:
          $ref: "#/components/schemas/AssetPrice"
        is_hidden:
          type: boolean
          description: "Is asset showed or hidden"
        balance:
          type: string
          description: "Balance in minimal units (wei, nanoton, satoshi, sun)"
    AssetMarketCap:
      type: object
      additionalProperties:
        type: string
      description: "Current price per currency, e.g. {\"USD\": \"0.999\", \"TON\": \"0.789\"}"
    AssetPrice:
      type: object
      description: "Price info with diffs, keyed by currency (e.g. USD, TON, RUB)"
      properties:
        prices:
          type: object
          additionalProperties:
            type: number
            format: double
          description: "Current price per currency, e.g. {\"USD\": \"0.999\", \"TON\": \"0.789\"}"
        diff_24h:
          type: object
          additionalProperties:
            type: string
          description: "Price change over 24h per currency, e.g. {\"USD\": \"-0.06%\"}"
        diff_7d:
          type: object
          additionalProperties:
            type: string
          description: "Price change over 7d per currency, e.g. {\"USD\": \"-0.05%\"}"
        diff_30d:
          type: object
          additionalProperties:
            type: string
          description: "Price change over 30d per currency, e.g. {\"USD\": \"-0.06%\"}"
    AssetInfo:
      type: object
      description: "Token metadata (used in both balances and activities)"
      required: [ asset_id, decimals, name, symbol, image ]
      properties:
        asset_id:
          type: string
          description: "Universal asset ID in format chain/network/type/address (e.g. eth/mainnet/coin, ton/mainnet/jetton/EQC...)"
        name:
          type: string
          description: "Asset name"
        symbol:
          type: string
          description: "Asset symbol (ticker)"
        decimals:
          type: integer
          description: "Decimals of coin or token"
        image:
          type: string
          description: "Asset image URL"
    FeeEstimate:
      type: object
      required: [ slow, normal, fast ]
      properties:
        slow:
          type: string
          description: "Fee estimate for slow confirmation"
        normal:
          type: string
          description: "Fee estimate for normal confirmation"
        fast:
          type: string
          description: "Fee estimate for fast confirmation"
    WalletAccount:
      type: object
      required: [ chain, address ]
      properties:
        chain:
          $ref: '#/components/schemas/Chain'
        address:
          type: string
          minLength: 1
          maxLength: 128
    Wallet:
      type: object
      required: [ wallet_id, accounts, created_at ]
      properties:
        wallet_id:
          type: string
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/WalletAccount'
        created_at:
          type: string
          format: date-time
    ActivityType:
      type: string
      enum: [ send, receive, swap ]
    ActivityStatus:
      type: string
      enum: [ pending, confirmed, failed, dropped ]
    ActivityDirection:
      type: string
      enum: [ in, out, self ]
    Activity:
      type: object
      required: [ activity_type, status, block_time, from_chain, to_chain, direction, tx_ids ]
      properties:
        activity_type:
          $ref: '#/components/schemas/ActivityType'
        status:
          $ref: '#/components/schemas/ActivityStatus'
        block_time:
          type: string
          format: date-time
        block_number:
          type: integer
          format: int64
        from_chain:
          $ref: '#/components/schemas/Chain'
        to_chain:
          $ref: '#/components/schemas/Chain'
        wallet_address:
          type: string
        direction:
          $ref: '#/components/schemas/ActivityDirection'
        from_address:
          type: string
        to_address:
          type: string
        out_token:
          $ref: '#/components/schemas/AssetInfo'
        out_amount:
          type: string
        out_amount_usd:
          type: number
          format: double
        in_token:
          $ref: '#/components/schemas/AssetInfo'
        in_amount:
          type: string
        in_amount_usd:
          type: number
          format: double
        fee_token:
          $ref: '#/components/schemas/AssetInfo'
        fee_amount:
          type: string
        fee_amount_usd:
          type: number
          format: double
        protocol:
          type: string
          description: "DEX/bridge protocol name (uniswap_v3, stargate, etc.)"
        tx_ids:
          type: array
          items:
            type: string
          description: "On-chain tx identifiers, format: chain:txhash"
        is_read:
          type: boolean
        meta:
          type: object
          additionalProperties: true
          description: "Chain-specific extras (memo, input data, etc.)"

  requestBodies:
    RegisterWallet:
      description: "Register a wallet with its accounts"
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [ wallet_id, accounts ]
            properties:
              wallet_id:
                type: string
                minLength: 1
                maxLength: 128
                pattern: "^[a-zA-Z0-9_-]+$"
              accounts:
                type: array
                minItems: 1
                items:
                  $ref: '#/components/schemas/WalletAccount'
    BroadcastTx:
      description: "Signed transaction to broadcast"
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [ chain, tx ]
            properties:
              chain:
                $ref: '#/components/schemas/Chain'
              tx:
                type: string
                format: byte
                description: "Signed transaction bytes, base64-encoded"
    SearchBatchAssets:
      description: "Batch search across multiple chains"
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [ currencies, sort ]
            properties:
              currencies:
                type: array
                description: "Base currencies"
                items:
                  type: string
                example: [ "ton", "usd", "rub" ]
              assets:
                type: array
                description: "Assets to show"
                items:
                  type: string
                example: [ "ton/mainnet/coin", "eth/mainnet/erc20/0x06decdcf842ac7e259e95906a02ebd16144d4306" ]
              sort:
                type: string
                enum: [ market_cap, volume ]
              search:
                type: string
              limit:
                type: integer
                minimum: 0
                maximum: 50
                default: 25
                example: 50
              cursor:
                type: string
    SetAssetFilters:
      description: "Set asset hidden/shown filter"
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [changes]
            properties:
              changes:
                type: array
                items:
                  type: object
                  required: [ asset_id, action ]
                  properties:
                    asset_id:
                      type: string
                    action:
                      type: string
                      enum: [show, hide]

  responses:
    BadRequest:
      description: "Invalid request"
      content:
        application/json:
          schema:
            type: object
            required: [ error ]
            properties:
              error:
                type: string
    NotFound:
      description: "Resource not found"
      content:
        application/json:
          schema:
            type: object
            required: [ error ]
            properties:
              error:
                type: string
    InternalError:
      description: "Internal server error"
      content:
        application/json:
          schema:
            type: object
            required: [ error ]
            properties:
              error:
                type: string
    NotModified:
      description: "Content not modified (ETag match)"
    Wallets:
      description: "Wallet details"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Wallet'
    ChainNodes:
      description: "List of supported chains"
      headers:
        ETag:
          schema:
            type: string
          description: "Entity tag for cache validation"
      content:
        application/json:
          schema:
            type: object
            required: [ nodes ]
            properties:
              nodes:
                type: array
                items:
                  $ref: '#/components/schemas/ChainNode'
    Assets:
      description: "Assets for the address"
      content:
        application/json:
          schema:
            type: object
            required: [ assets, next_cursor ]
            properties:
              assets:
                type: array
                items:
                  $ref: '#/components/schemas/SummaryAsset'
              next_cursor:
                type: string
    WalletAssets:
      description: "All assets for the wallet"
      content:
        application/json:
          schema:
            type: object
            required: [ assets, fiatPrice, next_cursor ]
            properties:
              assets:
                type: array
                items:
                  $ref: '#/components/schemas/Asset'
              fiatPrice:
                type: object
                additionalProperties:
                  type: string
                description: "Current price per currency, e.g. {\"USD\": \"0.999\", \"TON\": \"0.789\"}"
              next_cursor:
                type: string
    BroadcastResult:
      description: "Transaction broadcast result"
      content:
        application/json:
          schema:
            type: object
            required: [ txHash ]
            properties:
              txHash:
                type: string
    FeeEstimates:
      description: "Fee estimates"
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/FeeEstimate'
    Activities:
      description: "Activity history"
      content:
        application/json:
          schema:
            type: object
            required: [ activities ]
            properties:
              activities:
                type: array
                items:
                  $ref: '#/components/schemas/Activity'
              cursor:
                type: string
                description: "Cursor for next page, empty if no more data"

paths:
  /api/v1/healthcheck:
    get:
      summary: Check server readiness
      operationId: healthcheck
      tags:
        - system
      responses:
        '200':
          description: "Server is ready"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ok'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/nodes:
    get:
      operationId: getNodes
      summary: Get manifest of supported chains
      tags:
        - nodes
      parameters:
        - $ref: '#/components/parameters/IfNoneMatch'
      responses:
        '200':
          $ref: '#/components/responses/ChainNodes'
        '304':
          $ref: '#/components/responses/NotModified'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/assets/search:
    get:
      operationId: searchAssets
      summary: Get assets for an address on a chain
      tags:
        - assets
      parameters:
        - $ref: '#/components/parameters/ChainQuery'
        - $ref: '#/components/parameters/CurrenciesQuery'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/SortQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/CursorQuery'
      responses:
        '200':
          $ref: '#/components/responses/Assets'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/broadcast:
    post:
      operationId: broadcastTx
      summary: Broadcast a signed transaction
      tags:
        - broadcast
      requestBody:
        $ref: '#/components/requestBodies/BroadcastTx'
      responses:
        '200':
          $ref: '#/components/responses/BroadcastResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/fees/{chain}:
    get:
      operationId: getFees
      summary: Get fee estimates for a chain
      tags:
        - fees
      parameters:
        - $ref: '#/components/parameters/ChainPath'
      responses:
        '200':
          $ref: '#/components/responses/FeeEstimates'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/wallets:
    post:
      operationId: registerWallet
      summary: Register a wallet with its accounts
      tags:
        - wallets
      requestBody:
        $ref: '#/components/requestBodies/RegisterWallet'
      responses:
        '200':
          $ref: '#/components/responses/Wallets'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'
  
  /api/v1/wallets/{wallet_id}:
    get:
      operationId: getWallet
      summary: Get wallet by id
      tags:
        - wallets
      parameters:
        - $ref: '#/components/parameters/WalletIdPath'
      responses:
        '200':
          $ref: '#/components/responses/Wallets'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/wallets/{wallet_id}/assets:
    get:
      operationId: getWalletAssets
      summary: Get assets for all accounts of a registered wallet
      tags:
        - wallets
      parameters:
        - $ref: '#/components/parameters/WalletIdPath'
        - $ref: '#/components/parameters/AssetIdsQuery'
        - $ref: '#/components/parameters/ChainQuery'
        - $ref: '#/components/parameters/SearchQuery'
        - $ref: '#/components/parameters/AvailableOnlyQuery'
        - $ref: '#/components/parameters/ShowHiddenQuery'
        - $ref: '#/components/parameters/ShowAllQuery'
        - $ref: '#/components/parameters/CurrenciesQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/CursorQuery'
      responses:
        '200':
          $ref: '#/components/responses/WalletAssets'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
    post:
      operationId: saveWalletAssetsFilters
      summary: Set wallet's assets hidden/shown settings
      tags:
        - wallets
      parameters:
        - $ref: '#/components/parameters/WalletIdPath'
      requestBody:
        $ref: '#/components/requestBodies/SetAssetFilters'
      responses:
        '200':
          description: OK (no content)
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /api/v1/wallets/{wallet_id}/activities:
    get:
      operationId: getWalletActivities
      summary: Get activity history for a registered wallet
      tags:
        - wallets
      parameters:
        - $ref: '#/components/parameters/WalletIdPath'
        - $ref: '#/components/parameters/LimitQuery'
        - $ref: '#/components/parameters/CursorQuery'
        - $ref: '#/components/parameters/ChainQuery'
        - $ref: '#/components/parameters/ActivityTypeQuery'
      responses:
        '200':
          $ref: '#/components/responses/Activities'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'
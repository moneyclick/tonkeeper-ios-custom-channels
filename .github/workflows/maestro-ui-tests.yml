name: Maestro UI Tests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 2-6"  

env:
  DERIVED_DATA: build/DerivedData-maestro

jobs:
  discover-flow-groups:
    name: Resolve Maestro flow shards from config
    runs-on: ubuntu-latest
    outputs:
      flow_groups: ${{ steps.set.outputs.flow_groups }}
    steps:
      - uses: actions/checkout@v6

      - id: set
        shell: bash
        run: |
          set -euo pipefail
          cfg="maestro_ui_tests/config.yaml"
          if [[ ! -f "$cfg" ]]; then
            echo "::error::maestro_ui_tests/config.yaml not found"
            exit 1
          fi
          mapfile -t groups < <(
            sed -n 's/^[[:space:]]*-[[:space:]]*["'\'']*flows\/\([^/"*[:space:]]*\)\/.*/\1/p' "$cfg" | sort -u
          )
          if [[ ${#groups[@]} -eq 0 ]]; then
            echo "::error::No flow shard folders under 'flows:' in maestro_ui_tests/config.yaml (expected '  - flows/<folder>/*')"
            exit 1
          fi
          for g in "${groups[@]}"; do
            if [[ ! -d "maestro_ui_tests/flows/${g}" ]]; then
              echo "::error::Flow folder from config missing on disk: maestro_ui_tests/flows/${g}"
              exit 1
            fi
          done
          json="$(printf '%s\n' "${groups[@]}" | jq -R . | jq -s -c .)"
          echo "flow_groups=$json" >> "$GITHUB_OUTPUT"

  maestro-build-simulator:
    name: Build iOS Simulator app for Maestro
    runs-on: macos-26-xlarge
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate ios_keys access token
        id: generate_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: tonkeeper
          repositories: ios_keys

      - name: Clone ios_keys
        shell: bash
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          set -euo pipefail
          git clone --branch main --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/tonkeeper/ios_keys.git" ./ios_keys

      - name: Select Xcode 26.3
        shell: bash
        run: |
          set -euo pipefail
          XCODE_PATH="/Applications/Xcode_26.3.app/Contents/Developer"
          if [[ ! -d "$XCODE_PATH" ]]; then
            echo "Xcode 26.3 is not available at $XCODE_PATH"
            exit 1
          fi
          export DEVELOPER_DIR="$XCODE_PATH"
          echo "DEVELOPER_DIR=$XCODE_PATH" >> "$GITHUB_ENV"
          xcodebuild -version

      - name: Import Development certificate and provisioning profile
        shell: bash
        env:
          DEV_CERTIFICATE_P12_BASE64: ${{ secrets.DEV_CERTIFICATE_P12_BASE64 }}
          DEV_CERTIFICATE_P12_PASSWORD: ${{ secrets.DEV_CERTIFICATE_P12_PASSWORD }}
          DEV_PROVISIONING_PROFILE_BASE64: ${{ secrets.DEV_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          if [[ -z "${DEV_CERTIFICATE_P12_BASE64:-}" || -z "${DEV_CERTIFICATE_P12_PASSWORD:-}" ]]; then
            echo "Set repository secrets DEV_CERTIFICATE_P12_BASE64 and DEV_CERTIFICATE_P12_PASSWORD."
            exit 1
          fi
          if [[ -z "${DEV_PROVISIONING_PROFILE_BASE64:-}" ]]; then
            echo "Set repository secret DEV_PROVISIONING_PROFILE_BASE64 (base64 of the .mobileprovision file)."
            exit 1
          fi
          KEYCHAIN_PATH="$RUNNER_TEMP/maestro-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          echo -n "$DEV_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/dev_cert.p12"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychain -d user | sed 's/"//g')
          security default-keychain -s "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/dev_cert.p12" -P "$DEV_CERTIFICATE_P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/dev_cert.p12"

          echo -n "$DEV_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$RUNNER_TEMP/dev.mobileprovision"
          security cms -D -i "$RUNNER_TEMP/dev.mobileprovision" > "$RUNNER_TEMP/dev_profile.plist"
          PROFILE_UUID="$(plutil -extract UUID raw "$RUNNER_TEMP/dev_profile.plist")"
          PP_RUNNER="$HOME/Library/MobileDevice/Provisioning Profiles"
          PP_CODEX="${{ github.workspace }}/build/codex_home/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_RUNNER" "$PP_CODEX"
          cp "$RUNNER_TEMP/dev.mobileprovision" "$PP_RUNNER/${PROFILE_UUID}.mobileprovision"
          cp "$RUNNER_TEMP/dev.mobileprovision" "$PP_CODEX/${PROFILE_UUID}.mobileprovision"
          rm -f "$RUNNER_TEMP/dev.mobileprovision" "$RUNNER_TEMP/dev_profile.plist"

          {
            echo "KEYCHAIN_PATH<<MAESTRO_KC_EOF"
            echo "$KEYCHAIN_PATH"
            echo "MAESTRO_KC_EOF"
            echo "KEYCHAIN_PASSWORD<<MAESTRO_KC_EOF"
            echo "$KEYCHAIN_PASSWORD"
            echo "MAESTRO_KC_EOF"
          } >> "$GITHUB_ENV"

      - name: Copy Firebase resources
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -d ./ios_keys/Firebase ]]; then
            echo "ios_keys/Firebase not found"
            exit 1
          fi
          rm -rf ./Tonkeeper/Resources/Firebase
          cp -R ./ios_keys/Firebase ./Tonkeeper/Resources/Firebase
          rm -rf ./ios_keys

      - name: Configure Swift package SCM
        shell: bash
        run: |
          set -euo pipefail
          defaults write com.apple.dt.Xcode IDEPackageSupportUseBuiltinSCM -bool NO
          defaults read com.apple.dt.Xcode IDEPackageSupportUseBuiltinSCM

      - name: Resolve Swift packages
        shell: bash
        env:
          GIT_TERMINAL_PROMPT: "0"
          GCM_INTERACTIVE: Never
          HOME: ${{ github.workspace }}/build/codex_home
          SWIFTPM_CACHE_PATH: ${{ github.workspace }}/build/swiftpm-cache
          SWIFTPM_CONFIG_DIR: ${{ github.workspace }}/build/swiftpm-config
          CLANG_MODULE_CACHE_PATH: ${{ github.workspace }}/build/clang-module-cache
          CLONED_SOURCE_PACKAGES_DIR: ${{ github.workspace }}/build/SourcePackages
        run: |
          set -euo pipefail
          export NSUnbufferedIO=YES
          mkdir -p "$HOME" "$SWIFTPM_CACHE_PATH" "$SWIFTPM_CONFIG_DIR" "$CLANG_MODULE_CACHE_PATH" "$CLONED_SOURCE_PACKAGES_DIR"
          xcodebuild \
            -scmProvider system \
            -resolvePackageDependencies \
            -onlyUsePackageVersionsFromResolvedFile \
            -skipPackageUpdates \
            -project Tonkeeper.xcodeproj \
            -scheme Tonkeeper \
            -clonedSourcePackagesDirPath "$CLONED_SOURCE_PACKAGES_DIR"

      - name: Build Tonkeeper for iOS Simulator
        shell: bash
        env:
          GIT_TERMINAL_PROMPT: "0"
          GCM_INTERACTIVE: Never
          HOME: ${{ github.workspace }}/build/codex_home
          SWIFTPM_CACHE_PATH: ${{ github.workspace }}/build/swiftpm-cache
          SWIFTPM_CONFIG_DIR: ${{ github.workspace }}/build/swiftpm-config
          CLANG_MODULE_CACHE_PATH: ${{ github.workspace }}/build/clang-module-cache
          CLONED_SOURCE_PACKAGES_DIR: ${{ github.workspace }}/build/SourcePackages
        run: |
          set -euo pipefail
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          export NSUnbufferedIO=YES
          xcodebuild \
            -scmProvider system \
            -disableAutomaticPackageResolution \
            -onlyUsePackageVersionsFromResolvedFile \
            -project Tonkeeper.xcodeproj \
            -scheme Tonkeeper \
            -configuration TonkeeperDebug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "${{ github.workspace }}/$DERIVED_DATA" \
            -clonedSourcePackagesDirPath "$CLONED_SOURCE_PACKAGES_DIR" \
            ARCHS=arm64 \
            build

      - name: Zip Tonkeeper.app for Maestro CI
        shell: bash
        run: |
          set -euo pipefail
          APP="$(find "${{ github.workspace }}/$DERIVED_DATA/Build/Products" -type d -name 'Tonkeeper.app' -print -quit)"
          if [[ -z "$APP" ]]; then
            echo "Tonkeeper.app not found"
            exit 1
          fi
          mkdir -p build
          (cd "$(dirname "$APP")" && zip -rq "${{ github.workspace }}/build/TonkeeperSimulator.zip" "$(basename "$APP")")

      - name: Upload simulator app
        uses: actions/upload-artifact@v6
        with:
          name: maestro-ios-tonkeeper-app
          path: build/TonkeeperSimulator.zip
          if-no-files-found: error

  maestro-ui-tests:
    name: Maestro — ${{ matrix.flow_group }}
    needs: [discover-flow-groups, maestro-build-simulator]
    runs-on: macos-26-xlarge
    timeout-minutes: 120
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        flow_group: ${{ fromJson(needs.discover-flow-groups.outputs.flow_groups) }}
    env:
      MAESTRO_DRIVER_STARTUP_TIMEOUT: "180000"
      MAESTRO_CLI_LOG_PATTERN_CONSOLE: '%d{HH:mm:ss.SSS} [%level] %msg%n'
      MAESTRO_CI_ARTIFACTS_DIR: build/maestro-ci-artifacts-${{ matrix.flow_group }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode 26.3
        shell: bash
        run: |
          set -euo pipefail
          XCODE_PATH="/Applications/Xcode_26.3.app/Contents/Developer"
          if [[ ! -d "$XCODE_PATH" ]]; then
            echo "Xcode 26.3 is not available at $XCODE_PATH"
            exit 1
          fi
          export DEVELOPER_DIR="$XCODE_PATH"
          echo "DEVELOPER_DIR=$XCODE_PATH" >> "$GITHUB_ENV"
          xcodebuild -version

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Maestro CLI
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Verify Maestro installation
        run: maestro --version

      - name: Download simulator app
        uses: actions/download-artifact@v6
        with:
          name: maestro-ios-tonkeeper-app
          path: build/app-download

      - name: Unzip app bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/maestro-app"
          unzip -q -o "$(find build/app-download -name '*.zip' -print -quit)" -d "$RUNNER_TEMP/maestro-app"
          APP="$(find "$RUNNER_TEMP/maestro-app" -type d -name '*.app' -print -quit)"
          if [[ -z "$APP" ]]; then
            echo "No .app inside zip"
            find "$RUNNER_TEMP/maestro-app" -type d || true
            exit 1
          fi
          echo "MAESTRO_APP_PATH=$APP" >> "$GITHUB_ENV"

      - name: Select iOS Simulator
        shell: bash
        run: |
          set -euo pipefail
          SIMULATOR_UDID="$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ { print $2; exit }' | tr -d '[:space:]')"
          if [[ -z "$SIMULATOR_UDID" ]]; then
            echo "No available iPhone simulator found"
            exit 1
          fi
          echo "SIMULATOR_UDID=$SIMULATOR_UDID" >> "$GITHUB_ENV"
          echo "Using simulator: $SIMULATOR_UDID"

      - name: Simulator host defaults (hardware keyboard)
        shell: bash
        run: |
          set -euo pipefail
          defaults write com.apple.iphonesimulator ConnectHardwareKeyboard -bool true

      - name: Boot iOS Simulator
        shell: bash
        run: |
          set -euo pipefail
          xcrun simctl boot "$SIMULATOR_UDID" || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b

      - name: Set simulator locale en_US
        shell: bash
        run: |
          set -euo pipefail
          xcrun simctl shutdown "$SIMULATOR_UDID" || true
          sleep 2
          PLIST="${HOME}/Library/Developer/CoreSimulator/Devices/${SIMULATOR_UDID}/data/Library/Preferences/.GlobalPreferences.plist"
          if [[ ! -f "$PLIST" ]]; then
            echo "Missing $PLIST"
            exit 1
          fi
          if plutil -replace AppleLocale -string "en_US" "$PLIST" 2>/dev/null; then
            :
          else
            plutil -insert AppleLocale -string "en_US" "$PLIST"
          fi
          if plutil -replace AppleLanguages -json '["en-US"]' "$PLIST" 2>/dev/null; then
            :
          else
            plutil -insert AppleLanguages -json '["en-US"]' "$PLIST"
          fi
          if plutil -replace Country -string "US" "$PLIST" 2>/dev/null; then
            :
          else
            plutil -insert Country -string "US" "$PLIST" 2>/dev/null || true
          fi
          xcrun simctl boot "$SIMULATOR_UDID" || true
          xcrun simctl bootstatus "$SIMULATOR_UDID" -b
          open -a Simulator || true
          sleep 8

      - name: Install app on booted simulator
        shell: bash
        run: |
          set -euo pipefail
          xcrun simctl install booted "$MAESTRO_APP_PATH"
          sleep 12

      - name: Prepare Maestro CI artifact directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${{ github.workspace }}/${{ env.MAESTRO_CI_ARTIFACTS_DIR }}"

      - name: Start simulator screen recording
        shell: bash
        run: |
          set -euo pipefail
          VIDEO_PATH="${{ github.workspace }}/${{ env.MAESTRO_CI_ARTIFACTS_DIR }}/simulator-run.mp4"
          PID_PATH="${{ github.workspace }}/${{ env.MAESTRO_CI_ARTIFACTS_DIR }}/record.pid"
          xcrun simctl io booted recordVideo --codec h264 "$VIDEO_PATH" &
          echo $! > "$PID_PATH"

      - name: Start Simulator log stream (Tonkeeper process)
        shell: bash
        run: |
          set -euo pipefail
          ART="${{ github.workspace }}/${{ env.MAESTRO_CI_ARTIFACTS_DIR }}"
          LOG_OUT="$ART/simulator-unified.log"
          PID_FILE="$ART/log-stream.pid"
          xcrun simctl spawn booted log stream \
            --style compact \
            --level default \
            --predicate 'processImagePath CONTAINS[c] "Tonkeeper.app"' \
            > "$LOG_OUT" 2>&1 &
          echo $! > "$PID_FILE"

      - name: Run Maestro tests
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/maestro-test-output"
          ART="${{ github.workspace }}/${{ env.MAESTRO_CI_ARTIFACTS_DIR }}"
          mkdir -p "$ART"
          FLOW_DIR="${{ github.workspace }}/maestro_ui_tests/flows/${{ matrix.flow_group }}"
          maestro --version
          set +e
          maestro --verbose test \
            -e PASSWORD_KEY=5 \
            -e "MNEMONIC_PHRASE=${{ secrets.MAESTRO_MNEMONIC_PHRASE }}" \
            -e "WALLET_WITH_MONEY=${{ secrets.MAESTRO_WALLET_WITH_MONEY }}" \
            -e "WALLET_WITH_MONEY_ADDR=${{ secrets.MAESTRO_WALLET_WITH_MONEY_ADDR }}" \
            -e "auth=${{ secrets.MAESTRO_AUTH }}" \
            -e "RECIEVE_WALLET=${{ secrets.MAESTRO_RECIEVE_WALLET }}" \
            -e "TESTNET_MNEM=${{ secrets.MAESTRO_TESTNET_MNEM }}" \
            -p ios \
            --test-output-dir "$RUNNER_TEMP/maestro-test-output" \
            --debug-output "$ART" \
            --flatten-debug-output \
            "$FLOW_DIR"
          MAESTRO_EXIT=$?
          set -e
          printf '%s' "$MAESTRO_EXIT" > "$ART/maestro-exit.txt"
          exit "$MAESTRO_EXIT"

      - name: Write Maestro CI summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          ART="${{ github.workspace }}/${{ env.MAESTRO_CI_ARTIFACTS_DIR }}"
          CODE=1
          if [[ -f "$ART/maestro-exit.txt" ]]; then
            read -r _code < "$ART/maestro-exit.txt" || _code=1
            if [[ -n "$_code" && "$_code" =~ ^[0-9]+$ ]]; then
              CODE="$_code"
            fi
          fi
          if [[ -f "$ART/maestro.log" ]]; then
            python3 "${{ github.workspace }}/maestro_ui_tests/scripts/summarize_maestro_log.py" \
              --log "$ART/maestro.log" \
              --out "$ART/maestro-ci-summary.txt" \
              --flow-group "${{ matrix.flow_group }}" \
              --exit "$CODE"
            if [[ -n "${GITHUB_STEP_SUMMARY:-}" ]]; then
              echo "### Maestro (${{ matrix.flow_group }})" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
              cat "$ART/maestro-ci-summary.txt" >> "$GITHUB_STEP_SUMMARY"
              echo '```' >> "$GITHUB_STEP_SUMMARY"
            fi
          else
            echo "No $ART/maestro.log; skipping maestro-ci-summary." >&2
          fi

      - name: Stop simulator screen recording and log stream
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          ART="${{ github.workspace }}/${{ env.MAESTRO_CI_ARTIFACTS_DIR }}"
          PID_PATH="$ART/record.pid"
          LOG_PID_PATH="$ART/log-stream.pid"
          if [[ -f "$PID_PATH" ]]; then
            kill -SIGINT "$(cat "$PID_PATH")" 2>/dev/null || true
            sleep 5
          fi
          if [[ -f "$LOG_PID_PATH" ]]; then
            kill -SIGTERM "$(cat "$LOG_PID_PATH")" 2>/dev/null || true
            sleep 2
          fi

      - name: Stage Maestro log and screen recording for upload
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          STAGING="${{ github.workspace }}/build/maestro-ci-upload/${{ matrix.flow_group }}"
          SRC="${{ github.workspace }}/${{ env.MAESTRO_CI_ARTIFACTS_DIR }}"
          mkdir -p "$STAGING"
          if [[ -f "$SRC/maestro.log" ]]; then
            cp -f "$SRC/maestro.log" "$STAGING/"
          fi
          if [[ -f "$SRC/maestro-ci-summary.txt" ]]; then
            cp -f "$SRC/maestro-ci-summary.txt" "$STAGING/"
          fi
          if [[ -f "$SRC/maestro-exit.txt" ]]; then
            cp -f "$SRC/maestro-exit.txt" "$STAGING/"
          fi
          if [[ -f "$SRC/simulator-run.mp4" ]]; then
            cp -f "$SRC/simulator-run.mp4" "$STAGING/"
          fi
          if [[ -f "$SRC/simulator-unified.log" ]]; then
            cp -f "$SRC/simulator-unified.log" "$STAGING/"
          fi

      - name: Upload Maestro log and screen recording
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: maestro-ci-${{ github.run_id }}-${{ matrix.flow_group }}
          path: build/maestro-ci-upload/${{ matrix.flow_group }}
          retention-days: 14
          if-no-files-found: warn

workflows:
  ios-tonkeeper-unsigned-ipa:
    name: Tonkeeper iOS Custom Channels - Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_PROJECT: "Tonkeeper.xcodeproj"
        XCODE_SCHEME: "TonkeeperDev"
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          echo "Building Tonkeeper with Custom Channels feature"
          echo "Skipping make setup (requires private ios_keys)"
          
          if [ -f "Podfile" ]; then
            echo "Installing CocoaPods..."
            pod install
          fi
      - name: Build unsigned IPA (main app only, skip extensions)
        script: |
          # Build archive without code signing, skip widget and intents
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -archivePath "$HOME/build/tonkeeper.xcarchive" \
            -destination 'generic/platform=iOS' \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            SKIP_INSTALL=NO \
            BUILD_LIBRARY_FOR_DISTRIBUTION=NO 2>&1 | tee build.log || true
          
          # Check if main app was built
          if [ -d "$HOME/build/tonkeeper.xcarchive/Products/Applications" ]; then
            echo "✅ Main app built successfully"
            
            # Create unsigned IPA
            mkdir -p "$HOME/build/Payload"
            cp -r "$HOME/build/tonkeeper.xcarchive/Products/Applications/"*.app "$HOME/build/Payload/"
            cd "$HOME/build"
            zip -r tonkeeper-custom-channels-unsigned.ipa Payload
            
            echo "✅ Unsigned IPA created!"
            ls -lh "$HOME/build/"*.ipa
          else
            echo "❌ App not found in archive"
            echo "Build log:"
            tail -100 build.log
            exit 1
          fi
    artifacts:
      - $HOME/build/*.ipa
      - $HOME/build/tonkeeper.xcarchive
      - build.log
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true



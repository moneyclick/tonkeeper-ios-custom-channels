workflows:
  ios-tonkeeper-custom-channels:
    name: Tonkeeper iOS Custom Channels Build (Simulator)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_PROJECT: "Tonkeeper.xcodeproj"
        XCODE_SCHEME: "TonkeeperDev"
      xcode: 15.0
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          if [ -f "Makefile" ]; then
            make setup
          elif [ -f "Podfile" ]; then
            pod install
          fi
      - name: Build for iOS Simulator (No signing required)
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
            clean build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - /tmp/xcodebuild_logs/*.log
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true

  ios-tonkeeper-debug-build:
    name: Tonkeeper iOS Debug Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: 15.0
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          if [ -f "Makefile" ]; then
            make setup
          fi
      - name: Build debug version
        script: |
          xcodebuild \
            -project Tonkeeper.xcodeproj \
            -scheme TonkeeperDev \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            clean build
    artifacts:
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app

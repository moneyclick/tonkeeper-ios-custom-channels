workflows:
  ios-tonkeeper-unsigned-ipa:
    name: Tonkeeper iOS Custom Channels - Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_PROJECT: "Tonkeeper.xcodeproj"
        XCODE_SCHEME: "TonkeeperDev"
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          echo "Building Tonkeeper with Custom Channels feature"
          echo "Skipping make setup (requires private ios_keys)"
          
          if [ -f "Podfile" ]; then
            echo "Installing CocoaPods..."
            pod install
          fi
      - name: Build unsigned IPA
        script: |
          # Build archive without code signing
          xcodebuild archive \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -archivePath "$HOME/build/tonkeeper.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM=""
          
          # Create unsigned IPA
          mkdir -p "$HOME/build/Payload"
          cp -r "$HOME/build/tonkeeper.xcarchive/Products/Applications/"*.app "$HOME/build/Payload/"
          cd "$HOME/build"
          zip -r tonkeeper-custom-channels-unsigned.ipa Payload
          
          echo "✅ Unsigned IPA created!"
          ls -lh "$HOME/build/"*.ipa
    artifacts:
      - $HOME/build/*.ipa
      - $HOME/build/tonkeeper.xcarchive
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true



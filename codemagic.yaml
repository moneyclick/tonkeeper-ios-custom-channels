workflows:
  ios-tonkeeper-unsigned-ipa:
    name: Tonkeeper iOS Custom Channels - Unsigned IPA
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_PROJECT: "Tonkeeper.xcodeproj"
        XCODE_SCHEME: "TonkeeperDev"
      xcode: 16.2
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: |
          echo "Building Tonkeeper with Custom Channels feature"
          echo "Skipping make setup (requires private ios_keys)"
          
          if [ -f "Podfile" ]; then
            echo "Installing CocoaPods..."
            pod install
          fi
      - name: Build app directly (skip extensions)
        script: |
          # Build main app target directly without Widget/Intents
          echo "Building main Tonkeeper app only..."
          
          xcodebuild build \
            -project "$XCODE_PROJECT" \
            -target "Tonkeeper" \
            -configuration Debug \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            ONLY_ACTIVE_ARCH=NO
          
          # Find the built app
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Tonkeeper.app" -type d | head -n 1)
          
          if [ -n "$APP_PATH" ]; then
            echo "✅ App found at: $APP_PATH"
            
            # Create IPA manually
            mkdir -p "$HOME/build/Payload"
            cp -r "$APP_PATH" "$HOME/build/Payload/"
            cd "$HOME/build"
            zip -r tonkeeper-custom-channels-unsigned.ipa Payload
            
            echo "✅ Unsigned IPA created!"
            ls -lh "$HOME/build/"*.ipa
          else
            echo "❌ Could not find built app"
            exit 1
          fi
    artifacts:
      - $HOME/build/*.ipa
      - $HOME/build/tonkeeper.xcarchive
      - build.log
    publishing:
      email:
        recipients:
          - your-email@example.com
        notify:
          success: true
          failure: true


